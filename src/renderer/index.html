<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; frame-src https: http:; connect-src 'self' https:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grok</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="chrome" id="chrome">
      <div class="tabs" id="tabs" role="tablist" aria-label="Grok tabs"></div>
      <button class="new-tab" id="new-tab" type="button" title="New tab (Ctrl+T)" aria-label="New tab">
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2z"/>
        </svg>
      </button>
      <div class="chrome-spacer"></div>
      <button class="chrome-btn" id="reload-tab" type="button" title="Reload (Ctrl+R)" aria-label="Reload">
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M8 2.5a5.5 5.5 0 1 0 5.29 4.02.75.75 0 1 1 1.44.42A7 7 0 1 1 8 1a.75.75 0 0 1 0 1.5zm4.95.45a.75.75 0 0 1 0 1.06l-1.4 1.4a.75.75 0 0 1-1.06-1.06l1.4-1.4a.75.75 0 0 1 1.06 0z"/>
        </svg>
      </button>
      <button
        class="chrome-btn"
        id="pin-btn"
        type="button"
        title="Always on top (Ctrl+Shift+P)"
        aria-label="Always on top"
        aria-pressed="false"
      >
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M9.7 1.8a1 1 0 0 0-1.4 0L6.2 3.9 4.3 3.2a.75.75 0 0 0-.9.3L2.3 5.4a.75.75 0 0 0 .2 1l2.1 1.5-.8 3.2a.75.75 0 0 0 1.1.8l2.8-1.7 2.1 1.5a.75.75 0 0 0 1-.2l1.1-1.8a.75.75 0 0 0-.3-.9l-1.9-.9 2.1-2.1a1 1 0 0 0 0-1.4L9.7 1.8zM3.2 14.2a.75.75 0 0 0 1.1.1l3.3-3.1-.9-.7-3.4 2.9a.75.75 0 0 0-.1.8z"/>
        </svg>
      </button>
      <div class="menu-wrap">
        <button class="chrome-btn" id="settings-btn" type="button" title="Settings" aria-label="Settings" aria-expanded="false" aria-controls="settings-menu">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path fill="currentColor" d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM6.2 1.7a.75.75 0 0 1 .73-.55h2.14a.75.75 0 0 1 .73.55l.2.8a4.9 4.9 0 0 1 1.1.64l.8-.3a.75.75 0 0 1 .9.33l1.07 1.85a.75.75 0 0 1-.17.95l-.66.55c.06.37.1.75.1 1.13s-.04.76-.1 1.13l.66.55a.75.75 0 0 1 .17.95l-1.07 1.85a.75.75 0 0 1-.9.33l-.8-.3a4.9 4.9 0 0 1-1.1.64l-.2.8a.75.75 0 0 1-.73.55H6.93a.75.75 0 0 1-.73-.55l-.2-.8a4.9 4.9 0 0 1-1.1-.64l-.8.3a.75.75 0 0 1-.9-.33L2.13 10.8a.75.75 0 0 1 .17-.95l.66-.55A5.4 5.4 0 0 1 2.86 8c0-.38.04-.76.1-1.13l-.66-.55a.75.75 0 0 1-.17-.95L3.2 3.52a.75.75 0 0 1 .9-.33l.8.3c.34-.27.71-.49 1.1-.64l.2-.8z"/>
          </svg>
        </button>
        <div class="settings-menu" id="settings-menu" hidden role="menu">
          <label class="settings-row" role="menuitemcheckbox">
            <span>Always on top</span>
            <input type="checkbox" id="setting-always-on-top" />
          </label>
          <label class="settings-row" role="menuitemcheckbox">
            <span>Close to tray</span>
            <input type="checkbox" id="setting-close-to-tray" />
          </label>
          <label class="settings-row" role="menuitemcheckbox">
            <span>Hardware acceleration</span>
            <input type="checkbox" id="setting-hw-accel" />
          </label>
          <p class="settings-hint">Only turn this off if the window freezes. Changes need a restart.</p>
          <button type="button" class="settings-restart" id="restart-btn" hidden>Restart now</button>
        </div>
      </div>
    </header>
    <main class="views" id="views">
      <div class="loading-overlay" id="loading-overlay" aria-live="polite">
        <div class="loading-spinner" aria-hidden="true"></div>
        <p>Loading Grok…</p>
      </div>
    </main>
    <div class="toast" id="toast" hidden role="status" aria-live="polite"></div>
    <script src="renderer.js"></script>
  </body>
</html>
